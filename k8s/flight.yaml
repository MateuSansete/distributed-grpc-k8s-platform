# Serviço A — FlightService (gRPC Python, porta 50051)
#
# Deployment: diz ao Kubernetes "quero 1 cópia desse container rodando".
# Service:    cria um DNS interno (flight-service) para que outros pods
#             dentro do cluster encontrem esse serviço pelo nome.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-service
  labels:
    app: flight-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flight-service
  template:
    metadata:
      labels:
        app: flight-service
    spec:
      # Espera a massa de dados ser gerada (Job data-generator) antes de subir.
      # Sem isto o load do flights_db.json falha no import e o pod entra em CrashLoop.
      initContainers:
        - name: wait-for-data
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until [ -f /data/flights_db.json ]; do echo 'aguardando flights_db.json...'; sleep 2; done"]
          volumeMounts:
            - name: travel-data
              mountPath: /data
      containers:
        - name: flight-service
          image: flight-service:latest
          imagePullPolicy: Never   # usa imagem local do Minikube (não busca no Docker Hub)
          ports:
            - containerPort: 50051
          volumeMounts:
            - name: travel-data
              mountPath: /data
              readOnly: true
      volumes:
        - name: travel-data
          persistentVolumeClaim:
            claimName: travel-data
---
apiVersion: v1
kind: Service
metadata:
  name: flight-service
spec:
  type: ClusterIP   # acessível só dentro do cluster (nenhum acesso externo necessário)
  selector:
    app: flight-service
  ports:
    - port: 50051
      targetPort: 50051
