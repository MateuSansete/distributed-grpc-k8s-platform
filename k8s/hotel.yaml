# Serviço B — HotelService (gRPC Python, porta 50052)
#
# Mesma estrutura do flight.yaml; só muda o nome e a porta.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-service
  labels:
    app: hotel-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hotel-service
  template:
    metadata:
      labels:
        app: hotel-service
    spec:
      # Espera a massa de dados ser gerada (Job data-generator) antes de subir.
      # Sem isto o load do hotels_db.json falha no import e o pod entra em CrashLoop.
      initContainers:
        - name: wait-for-data
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until [ -f /data/hotels_db.json ]; do echo 'aguardando hotels_db.json...'; sleep 2; done"]
          volumeMounts:
            - name: travel-data
              mountPath: /data
      containers:
        - name: hotel-service
          image: hotel-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50052
          volumeMounts:
            - name: travel-data
              mountPath: /data
              readOnly: true
      volumes:
        - name: travel-data
          persistentVolumeClaim:
            claimName: travel-data
---
apiVersion: v1
kind: Service
metadata:
  name: hotel-service
spec:
  type: ClusterIP
  selector:
    app: hotel-service
  ports:
    - port: 50052
      targetPort: 50052
