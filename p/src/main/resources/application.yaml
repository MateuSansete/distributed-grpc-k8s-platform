server:
  port: 8080

spring:
  application:
    name: gateway

# Configuração dos clients gRPC (net.devh).
# Portas reais dos servidores Python: A (voos) = 50051, B (hotéis) = 50052.
# Channels são criados de forma lazy, então o gateway sobe mesmo com A/B offline.
grpc:
  client:
    flight-service:
      # Sobrescrevível por env (FLIGHT_SERVICE_ADDRESS) para containerização/K8s.
      address: ${FLIGHT_SERVICE_ADDRESS:static://localhost:50051}
      negotiation-type: plaintext
    hotel-service:
      address: ${HOTEL_SERVICE_ADDRESS:static://localhost:50052}
      negotiation-type: plaintext

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
